<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FB通话复制组检测</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>FB通话复制组检测</h1>
      <p>从通话链接查找复制组群聊，解析 messages/t/ 链接</p>
    </header>

    <section class="card">
      <label for="callUrl">粘贴通话链接</label>
      <textarea
        id="callUrl"
        rows="3"
        placeholder="例如：https://www.facebook.com/groupcall/..."
      ></textarea>
      <div class="actions">
        <button id="scanUrlBtn" type="button">打开并解析</button>
        <button id="scanTabBtn" type="button" class="secondary">解析当前标签页</button>
      </div>
    </section>

    <section id="copyAlert" class="copy-alert" hidden></section>

    <section id="status" class="status" hidden></section>

    <section id="results" class="results" hidden>
      <h2>找到的群聊链接</h2>
      <ul id="resultList"></ul>
    </section>

    <section class="card update-card">
      <div class="update-header">
        <span class="update-version">当前版本 <strong id="currentVersion">-</strong></span>
        <button id="checkUpdateBtn" type="button" class="secondary">检查更新</button>
      </div>
      <section id="updatePanel" class="update-panel" hidden></section>
    </section>

    <footer>
      <p>复制组：通话中邀请组外成员后，FB 会新建群聊，原组通话常断开。插件会提醒并给出复制组链接。</p>
    </footer>

    <script src="extractor.js"></script>
    <script src="update-checker.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
